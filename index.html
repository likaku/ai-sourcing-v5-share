<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Sourcing V5.0 — 集团采购决策中心（全持久化）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:#F8F5F0;color:#1A1A1A;line-height:1.55;font-size:13px}
.wrap{max-width:1400px;margin:0 auto;padding:24px;padding-left:268px}
@media(max-width:1180px){.wrap{padding-left:24px}}

/* Header */
.head{background:#fff;border-radius:8px;padding:20px 28px;margin-bottom:16px;border:0.5px solid #e5e5e5}
.h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.h-title{font-size:20px;font-weight:600;color:#c0392b}
.h-sub{color:#666;font-size:13px;margin-top:4px}
.h-meta{font-size:11px;color:#888}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:16px}
.kpi{background:#fafafa;padding:10px 12px;border-radius:6px;border:0.5px solid #e5e5e5}
.kpi-n{font-size:18px;font-weight:600;color:#c0392b}
.kpi-l{font-size:11px;color:#666;margin-top:2px}
.fx-bar{display:flex;gap:14px;margin-top:8px;padding:8px 12px;background:#f5f5f5;border-radius:4px;font-size:11px;color:#444;flex-wrap:wrap}
.fx-bar b{color:#c0392b;font-weight:600}

/* Mat card */
.mat{background:#fff;border-radius:8px;margin-bottom:12px;border:0.5px solid #e5e5e5;overflow:hidden}
.mat-hdr{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s}
.mat-hdr:hover{background:#fdf0ef}
.mat-hdr[aria-expanded="true"]{background:#fdf0ef;border-bottom:0.5px solid #e5e5e5}
.mat-arrow{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;color:#c0392b;font-size:11px;border:0.5px solid #c0392b;border-radius:3px;transition:transform .2s;flex-shrink:0}
.mat-hdr[aria-expanded="true"] .mat-arrow{transform:rotate(90deg);background:#c0392b;color:#fff}
.mat-name{flex:1;font-weight:600;font-size:14px}
.mat-tag{padding:2px 8px;border-radius:3px;font-size:11px;background:#fbeaef;color:#c0392b;border:0.5px solid #f0c0c8}
.mat-stats{font-size:11px;color:#666}
.mat-body{display:none;padding:0 20px 20px}
.mat[data-open="1"] .mat-body{display:block}

/* Plant card */
.plant{margin-top:12px;background:#fafafa;border-radius:6px;border:0.5px solid #e5e5e5;overflow:hidden}
.plant-hdr{padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:#fff}
.plant-hdr:hover{background:#f5f5f5}
.plant-hdr[aria-expanded="true"]{background:#f0f0f0}
.plant-arrow{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;color:#666;font-size:10px;border:0.5px solid #aaa;border-radius:3px;transition:transform .2s;flex-shrink:0}
.plant-hdr[aria-expanded="true"] .plant-arrow{transform:rotate(90deg);background:#666;color:#fff}
.plant-name{flex:1;font-weight:500}
.plant-best{padding:2px 8px;border-radius:3px;font-size:11px;background:#eaf3de;color:#3b6d11;border:0.5px solid #c0dd97;font-weight:500}
.plant-body{display:none;padding:14px 16px;background:#fafafa}
.plant[data-open="1"] .plant-body{display:block}

/* AI Insight */
.insight{background:#fdf8f7;border:0.5px solid #e2c8c7;border-radius:6px;padding:11px 14px;margin-bottom:12px;font-size:12px;line-height:1.65}
.insight-title{font-weight:600;color:#c0392b;margin-bottom:5px;display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.insight strong{color:#c0392b}
.insight b{color:#1a1a1a}
.ins-tag{display:inline-block;font-size:9.5px;color:#854f0b;background:#faeeda;border-radius:8px;padding:0 6px;margin-left:4px}
.ins-alert{margin-top:8px;padding:7px 10px;background:#fbeaef;border-radius:5px;color:#c0392b;font-size:11.5px;line-height:1.5}
.ins-alert b{color:#c0392b}
.ins-note{margin-top:6px;font-size:11px;color:#888;line-height:1.5}

/* Reg panel */
.reg{border:0.5px solid;border-radius:6px;padding:8px 12px;margin-bottom:10px}
.reg.import{background:#fdf8f7;border-color:#e2c8c7}
.reg.export{background:#f8f7fd;border-color:#d5cce8}
.reg-title{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:flex;gap:5px;align-items:center}
.reg-icon{width:14px;height:14px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
.reg-icon.import{background:#c0392b}
.reg-icon.export{background:#7c3aed}
.reg-tags{display:flex;flex-wrap:wrap;gap:4px}
.reg-tag{padding:2px 7px;border-radius:3px;font-size:10.5px;border:0.5px solid;cursor:help}
.reg-tag.ok{background:#eaf3de;border-color:#3b6d11;color:#3b6d11}
.reg-tag.warn{background:#faeeda;border-color:#854f0b;color:#854f0b}
.reg-tag.info{background:#e6f1fb;border-color:#185fa5;color:#185fa5}

/* Section title */
.sec{font-size:12px;font-weight:600;color:#666;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.sec-count{font-weight:400;color:#888}

/* Price chart */
.chart-wrap{background:#fff;border:0.5px solid #e5e5e5;border-radius:6px;padding:14px;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:#444;margin-bottom:10px}

/* ──── Source list (折叠下拽列表) ──── */
.src-list{background:#fff;border:0.5px solid #e5e5e5;border-radius:6px;overflow:hidden}
.src-row{border-bottom:0.5px solid #f0f0f0}
.src-row:last-child{border-bottom:none}
.src-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.src-hdr:hover{background:#fafafa}
.src-hdr[aria-expanded="true"]{background:#f7f4f1;border-bottom:0.5px solid #f0f0f0}
.src-row.best>.src-hdr{background:linear-gradient(0deg,#fff,#fff),#fdf0ef}
.src-row.best>.src-hdr:hover{background:#fdf0ef}
.src-arrow{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#666;font-size:9px;border:0.5px solid #aaa;border-radius:2px;transition:transform .2s;flex-shrink:0}
.src-hdr[aria-expanded="true"] .src-arrow{transform:rotate(90deg);background:#666;color:#fff}
.src-row.best .src-arrow{border-color:#c0392b;color:#c0392b}
.src-row.best .src-hdr[aria-expanded="true"] .src-arrow{background:#c0392b;color:#fff}
.src-flag{font-size:18px;line-height:1;width:24px;text-align:center;flex-shrink:0}
.src-name{flex:1;font-weight:500;font-size:13px;display:flex;align-items:center;gap:6px}
.src-best-tag{background:#c0392b;color:#fff;padding:1px 7px;border-radius:2px;font-size:10px;font-weight:500}
.src-rank{font-size:10px;background:#f5f5f5;padding:1px 5px;border-radius:2px;color:#666}
.src-region{display:inline-block;font-size:10px;padding:1px 5px;border-radius:2px;background:#f0f0f0;color:#666}
.src-risk{font-size:11px;padding:1px 6px;border-radius:2px;font-weight:500}
.src-risk.low{background:#eaf3de;color:#3b6d11}
.src-risk.medium{background:#faeeda;color:#854f0b}
.src-risk.high{background:#fcebeb;color:#A32D2D}
.src-ddp{font-weight:600;font-size:13px;color:#c0392b;min-width:120px;text-align:right}
.src-row.best .src-ddp{font-size:14px}
.src-body{display:none;padding:14px 18px 16px 38px;background:#fafafa;border-top:0.5px solid #f0f0f0}
.src-row[data-open="1"] .src-body{display:block}

/* Cost breakdown table */
.cost-table{width:100%;border-collapse:collapse;background:#fff;border:0.5px solid #e5e5e5;border-radius:4px;overflow:hidden;font-size:12px}
.cost-table th, .cost-table td{padding:7px 10px;text-align:left;border-bottom:0.5px solid #f0f0f0;vertical-align:top}
.cost-table th{background:#f5f5f5;font-weight:600;color:#444;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.cost-table td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.cost-table tr:last-child td{border-bottom:none}
.cost-table tr.total{background:#fdf0ef;font-weight:600;color:#c0392b}
.cost-table tr.total td{border-top:1px solid #f0c0c8}

/* 6-layer breakdown */
.layer-list{margin:8px 0 0}
.layer-row{background:#fff;border:0.5px solid #e5e5e5;border-radius:4px;margin-bottom:6px;overflow:hidden}
.layer-hdr{padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fff;transition:background .12s}
.layer-hdr:hover{background:#f7f4f1}
.layer-hdr[aria-expanded="true"]{background:#f7f4f1;border-bottom:0.5px solid #f0f0f0}
.layer-no{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:10px;font-weight:600;background:#fbeaef;color:#c0392b;flex-shrink:0}
.layer-row.layer-final .layer-no{background:#c0392b;color:#fff}
.layer-arrow{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#888;font-size:9px;border:0.5px solid #ccc;border-radius:2px;transition:transform .2s;flex-shrink:0}
.layer-hdr[aria-expanded="true"] .layer-arrow{transform:rotate(90deg);background:#666;color:#fff}
.layer-label{flex:1;font-weight:500;font-size:12px;color:#333}
.layer-row.layer-final .layer-label{font-weight:600;color:#c0392b}
.layer-formula{font-size:11px;color:#888}
.layer-val{font-weight:500;font-size:12px;color:#1a1a1a;font-variant-numeric:tabular-nums;min-width:120px;text-align:right}
.layer-row.layer-final .layer-val{font-weight:700;color:#c0392b;font-size:13px}
.layer-body{display:none;padding:8px 14px 12px 38px;background:#fafafa;border-top:0.5px solid #f0f0f0}
.layer-row[data-open="1"] .layer-body{display:block}
.layer-body .src-label{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#888;margin-bottom:4px}
.layer-body .src-list-inline{font-size:11px;line-height:1.6;color:#555}
.layer-body .src-list-inline li{padding-left:10px;position:relative;list-style:none}
.layer-body .src-list-inline li::before{content:"•";position:absolute;left:0;color:#999}

/* Sub section in src-body */
.subsec{font-size:11px;font-weight:600;color:#666;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.04em}

/* Evidence list */
.evidence-list{font-size:11px;color:#666;line-height:1.55}
.evidence-list li{margin-bottom:2px;padding-left:10px;position:relative}
.evidence-list li::before{content:"•";position:absolute;left:0;color:#888}

/* Supplier list */
.supp-list{display:flex;flex-direction:column;gap:4px}
.supp-row{background:#fff;border:0.5px solid #e5e5e5;border-radius:4px;overflow:hidden}
.supp-row.nf{background:#fafafa;border-style:dashed}
.supp-row-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:12px}
.supp-row-hdr:hover{background:#fafafa}
.supp-arrow{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#c0392b;font-size:11px;transition:transform .2s;flex-shrink:0}
.supp-row[data-open="1"] .supp-arrow{transform:rotate(90deg)}
.supp-row-name{font-weight:600;color:#1a1a1a;flex:1;min-width:0}
.supp-row-score{font-size:11px;color:#666;font-family:'SF Mono',Menlo,monospace;flex-shrink:0}
.supp-status{padding:1px 6px;border-radius:2px;font-size:10px;font-weight:500;flex-shrink:0}
.supp-status.active{background:#eaf3de;color:#3b6d11}
.supp-status.watch{background:#faeeda;color:#854f0b}
.supp-status.unverified{background:#f5f5f5;color:#888}
.supp-status.not_found{background:#fbeaef;color:#c0392b}
.supp-row-body{display:none;padding:0 10px 10px 32px;font-size:12px;line-height:1.7;border-top:0.5px solid #f0f0f0}
.supp-row[data-open="1"] .supp-row-body{display:block;padding-top:8px}
.supp-d{margin-bottom:2px;color:#333}
.supp-d b{color:#666;font-weight:600}
.supp-link{color:#2a6fb0;text-decoration:none;font-size:11px;margin-right:4px}
.supp-link:hover{text-decoration:underline}
.supp-tier{padding:1px 6px;border-radius:2px;font-size:10px;font-weight:500;flex-shrink:0}
.supp-tier.T1{background:#fbeaef;color:#c0392b}
.supp-tier.T2{background:#f5f5f5;color:#666}
/* V6.4 SKU 规格面板 */
.sku-panel{background:#fbfaf8;border:0.5px solid #e8e2d8;border-radius:6px;margin:0 0 14px;overflow:hidden}
.sku-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:linear-gradient(90deg,#f5f0e6 0%,#fbfaf8 100%)}
.sku-hdr:hover{background:#f5f0e6}
.sku-arrow{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;color:#854f0b;font-size:11px;border:0.5px solid #d8c5a3;border-radius:3px;transition:transform .2s;flex-shrink:0}
.sku-panel[data-open="1"] .sku-arrow{transform:rotate(90deg);background:#854f0b;color:#fff}
.sku-title{font-size:13px;font-weight:600;color:#854f0b}
.sku-vol{font-size:11px;color:#888;margin-left:auto;font-family:'SF Mono',Menlo,monospace}
.sku-body{display:none;padding:12px 14px}
.sku-panel[data-open="1"] .sku-body{display:block}
.sku-table{width:100%;border-collapse:collapse;font-size:12px}
.sku-table td{padding:6px 10px;border-bottom:0.5px solid #f0ece4;vertical-align:top;line-height:1.6}
.sku-table tr:last-child td{border-bottom:none}
.sku-k{width:140px;color:#854f0b;font-weight:600;background:#faf6ee}
.sku-v{color:#333}
.sku-prem-bar{margin-top:10px;padding:8px 10px;background:#fff;border:0.5px solid #f0c0c8;border-radius:4px;font-size:11.5px;color:#333;line-height:1.7}
.sku-prem-bar.sku-noimpact{border-color:#e5e5e5;color:#888}
.sku-prem-bar b{color:#c0392b}
.sku-prem{display:inline-block;background:#fbeaef;color:#c0392b;border-radius:3px;padding:1px 7px;margin:0 4px 2px 0;font-family:'SF Mono',Menlo,monospace;font-size:11px}

/* Footer info */
.foot{margin-top:16px;padding:14px;background:#fff;border:0.5px solid #e5e5e5;border-radius:6px;font-size:11px;color:#888}

/* Loading state */
.loading{text-align:center;padding:60px;color:#888}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #e5e5e5;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ──── V6.2 真实贸易流对齐度模块（仅顶部速览，工厂卡片不重复展示） ──── */
.v62-panel{background:#fff;border-radius:8px;margin-bottom:16px;border:0.5px solid #e5e5e5;overflow:hidden}
.v62-hdr{padding:14px 20px;background:linear-gradient(90deg,#fdf0ef 0%,#fff 100%);border-bottom:0.5px solid #f0c0c8;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.v62-hdr h3{font-size:14px;font-weight:600;color:#c0392b;display:flex;align-items:center;gap:8px}
.v62-hdr h3::before{content:"V6.2";background:#c0392b;color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.v62-hdr .v62-tip{font-size:11px;color:#888}
.v62-body{padding:14px 20px;display:none}
.v62-panel[data-open="1"] .v62-body{display:block}
.v62-panel[data-open="1"] .v62-arrow{transform:rotate(90deg);background:#c0392b;color:#fff}
.v62-arrow{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;color:#c0392b;font-size:11px;border:0.5px solid #c0392b;border-radius:3px;transition:transform .2s;flex-shrink:0;margin-right:8px}
.v62-summary-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.v62-summary-table th{background:#f7f3eb;padding:8px 10px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#666;font-weight:600;border-bottom:0.5px solid #e5e5e5}
.v62-summary-table td{padding:7px 10px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
.v62-summary-table tr:hover{background:#fafafa}
.v62-summary-table .num{text-align:right;font-family:'SF Mono',Menlo,monospace;font-size:11px}
.v62-align{padding:2px 8px;border-radius:3px;font-size:10.5px;font-weight:500;border:0.5px solid;display:inline-block}
.v62-align.aligned{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.v62-align.partial{background:#faeeda;color:#854f0b;border-color:#e6c8a3}
.v62-align.misaligned{background:#fbeaef;color:#c0392b;border-color:#f0c0c8}
.v62-mode{padding:1px 6px;border-radius:2px;font-size:10px;font-weight:500;font-family:'SF Mono',Menlo,monospace}
.v62-mode.domestic{background:#eaf3de;color:#3b6d11}
.v62-mode.import{background:#fbeaef;color:#c0392b}
.v62-mode.mixed{background:#faeeda;color:#854f0b}
.v62-mode.unknown{background:#f0f0f0;color:#888}

/* ──── V6.2 工厂级三视图（已移除，仅保留顶部速览） ──── */

/* ──── V6.2 Tabs ──── */
.v62-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:0.5px solid #e5e5e5}
.v62-tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:#666;background:none;border:none;border-bottom:2px solid transparent;transition:.15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.v62-tab:hover{color:#1a1a1a;background:#fafafa}
.v62-tab.active{color:#c0392b;border-bottom-color:#c0392b;font-weight:600}
.v62-tab-badge{padding:1px 7px;border-radius:10px;background:#f0f0f0;color:#666;font-size:11px;font-weight:600;font-family:'SF Mono',Menlo,monospace}
.v62-tab.active .v62-tab-badge{background:#fbeaef;color:#c0392b}

/* ──── EXW 台账 ──── */
.ledger-wrap{background:#fff;border-radius:8px;padding:0;border:0.5px solid #e5e5e5;overflow:hidden}
.ledger-toolbar{padding:14px 20px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ledger-toolbar select,.ledger-toolbar input{padding:6px 10px;border:0.5px solid #ccc;border-radius:4px;font-size:12px;font-family:inherit;background:#fff}
.ledger-toolbar label{font-size:11.5px;color:#666;display:inline-flex;align-items:center;gap:5px}
.ledger-stats{margin-left:auto;font-size:11.5px;color:#666;display:flex;gap:14px}
.ledger-stats b{color:#c0392b}
.ledger-table{width:100%;border-collapse:collapse;font-size:12px}
.ledger-table th{background:#f7f3eb;padding:10px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#666;font-weight:600;border-bottom:0.5px solid #e5e5e5;position:sticky;top:0;z-index:1}
.ledger-table td{padding:10px;border-bottom:0.5px solid #f0f0f0;vertical-align:top}
.ledger-table tr:hover{background:#fafafa}
.ledger-table .num{text-align:right;font-family:'SF Mono',Menlo,monospace;white-space:nowrap}
.ledger-table .name{font-weight:500;color:#1a1a1a}
.ledger-table .country{color:#666;font-size:11px}
.ledger-status{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10.5px;font-weight:500;border:0.5px solid;font-family:'SF Mono',Menlo,monospace}
.ledger-status.verified{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.ledger-status.unverified{background:#faeeda;color:#854f0b;border-color:#e6c8a3}
.ledger-status.estimated{background:#fff5e0;color:#854f0b;border-color:#f0d8a0}
.ledger-status.insufficient_sources{background:#fbeaef;color:#c0392b;border-color:#f0c0c8}
.ledger-status.not_found{background:#f0f0f0;color:#888;border-color:#ccc}
.ledger-status.archived{background:#e8e8e8;color:#666;border-color:#bbb}
.ledger-status.active,.ledger-status.candidate{background:#e6f1fb;color:#185fa5;border-color:#b3d4ed}
.ledger-evidence{max-width:380px}
.ledger-evidence ul{list-style:none;margin:0;padding:0}
.ledger-evidence li{padding:2px 0;font-size:10.5px;line-height:1.4;color:#666}
.ledger-evidence li a{color:#185fa5;text-decoration:none;word-break:break-all}
.ledger-evidence li a:hover{text-decoration:underline}
.ledger-evidence li.no-url{color:#c0392b;font-style:italic}

// ── 采购建议（按 material × plant 维度） ──
const INSIGHT_MAP = {
  '非转基因黄大豆::CN_GD': '<strong>巴拉圭/俄罗斯远东/巴西</strong>构成主力梯队，DDP ¥3.08-3.83/kg。<strong>建议策略</strong>：巴西占60%（主力，ProTerra认证完整供应链），中国本地占25%（备用，零关税抗物流中断），巴拉圭/加拿大占15%（战略储备，对冲单一来源风险）。T1主力供应商：CJ Selecta、COFCO、ADM Brasil；俄远东建议CNY结算规避制裁风险。',
  '非转基因黄大豆::EG_6OCT': '<strong>巴西/巴拉圭海运至埃及最优</strong>，DDP约¥4.5/kg。<strong>建议策略</strong>：巴西70%（主力），阿根廷20%（T2备选，价格弹性），南非10%（红海航线短）。埃及无本地非转基因大豆产能，100%进口；建议锁定ProTerra+EFSA双认证供应商签长约。',
  '食用盐::CN_GD': '<strong>印度Gujarat最优</strong>，DDP约¥0.52/kg，较中国本地节省34%。<strong>建议策略</strong>：印度Gujarat 60%（主力，价格优）+ 中国本地 40%（专营资质保供）。澳大利亚/智利可作高端配比备选。注意印度盐含碘要求需协商豁免。',
  '食用盐::EG_6OCT': '<strong>埃及本地El Mex绝对优势</strong>，DDP约¥0.60/kg，较进口低38%。<strong>建议策略</strong>：本地80%（主力）+ 印度Gujarat 20%（T2，红海航运便利）。T1主力：Sekem、Misr Salt Company。',

function getInsight(material, plant_id) {
  return INSIGHT_MAP[material + '::' + plant_id] || '建议结合候选源 DDP 排名 + 政策风险 + 供应商资质综合决策';
}

const STATE = { ds: null };

async function boot() {
  if (window.__DATA_STATE_V5__) {
    STATE.ds = window.__DATA_STATE_V5__;
    render(STATE.ds);
    return;
  }
  try {
    const res = await fetch('./data_state.json', { cache: 'no-cache' });
    const ds = await res.json();
    STATE.ds = ds;
    render(ds);
  } catch (e) {
    document.getElementById('main-list').innerHTML =
      '<div class="loading" style="color:#A32D2D">数据加载失败：' + e.message + '</div>';
  }
}

function render(ds) {
  document.getElementById('genat').textContent = (ds.generated_at || '').replace('T', ' ');
  const stats = ds.stats || {};
  const kpiList = [
    ['品类数', Object.keys(ds.materials || {}).length, '6 SKU'],
    ['工厂数', Object.keys(ds.plants || {}).length, '4 工厂'],
    ['候选源', stats.total_candidates || 0, 'origin × plant'],
    ['国家覆盖', Object.keys(ds.regulatory?.export || {}).length, '出口国'],
    ['供应商', stats.total_suppliers || 0, '库存'],
    ['数据源', stats.total_data_sources || 0, '台账']
  ];
  document.getElementById('kpi-grid').innerHTML = kpiList.map(k =>
    '<div class="kpi"><div class="kpi-n">' + k[1] + '</div><div class="kpi-l">' + k[0] + '：' + k[2] + '</div></div>'
  ).join('');

  const fx = ds.fx_rates || {};
  document.getElementById('fx-bar').innerHTML =
    '汇率（即时）: ' + Object.entries(fx).map(([p, r]) => p + ': <b>' + r + '</b>').join(' · ');

  const mats = ds.materials || {};
  const candidates = ds.candidates || [];
  const html = Object.entries(mats).map(([matName, info]) => {
    const matCands = candidates.filter(c => c.material === matName);
    const plants = info.applicable_plants || [];
    const totalOrigins = (ds.origins_by_material[matName] || []).length;

    const plantHtml = plants.map(pid => {
      const plantInfo = ds.plants[pid] || {};
      const plantCands = matCands.filter(c => c.plant_id === pid);
      const sortedCands = [...plantCands].sort((a, b) => {
        const va = a.ddp_usd_ton || a.ddp_usd_pcs || 9e9;
        const vb = b.ddp_usd_ton || b.ddp_usd_pcs || 9e9;
        return va - vb;
      });
      const best = sortedCands[0];
      const bestVal = best ? formatDDP(best, fx.USD_CNY) : '-';
      const importPolicy = ds.regulatory.import[matName + '::' + pid] || ds.regulatory.import[pid] || [];

      // ── 顺序：进口政策 → 价格曲线 → 采购建议 → 候选来源（折叠列表）
      // V6.2 三视图已移到顶部对齐度速览面板，工厂卡片不再重复
      let body = '';
      if (importPolicy.length) body += renderRegPanel(importPolicy, 'import', '进口国合规要求');
      body += renderPriceChart(matName, ds, pid);
      body += renderInsight(matName, pid, sortedCands, ds);
      body += '<div class="sec">候选来源国全景 <span class="sec-count">（' + sortedCands.length + ' 国，按 DDP 升序）</span></div>';
      body += renderSrcList(sortedCands, ds, matName, pid);

      return '<div class="plant"><div class="plant-hdr" data-plant-id="' + escapeAttr(pid) + '" aria-expanded="false">' +
        '<span class="plant-arrow">›</span>' +
        '<span class="plant-name">' + escapeHtml(plantInfo.short_name || pid) + '（' + escapeHtml(plantInfo.country || '') + '）</span>' +
        '<span class="plant-stats" style="font-size:11px;color:#666">' + sortedCands.length + ' 个候选源</span>' +
        '<span class="plant-best">' + bestVal + '</span>' +
        '</div><div class="plant-body">' + body + '</div></div>';
    }).join('');

    return '<div class="mat" data-mat-id="' + escapeAttr(matName) + '">' +
      '<div class="mat-hdr" aria-expanded="false">' +
      '<span class="mat-arrow">›</span>' +
      '<span class="mat-name">' + escapeHtml(matName) + '</span>' +
      '<span class="mat-tag">' + plants.length + ' 工厂</span>' +
      '<span class="mat-stats">' + totalOrigins + ' 全球候选源 · ' + matCands.length + ' DDP 候选</span>' +
      '</div><div class="mat-body">' + renderSkuSpec(matName, ds) + plantHtml + '</div></div>';
  }).join('');

  document.getElementById('main-list').innerHTML = html;

  // V6.4: 真实贸易流对齐度速览已移除（按需求下线）
  // V6.2: Tabs 切换（采购决策 / EXW 价格台账 / 政策预警）
  setupV62Tabs(ds);
  // V6.9: 左侧浮动导航栏
  setupSideNav(ds);
  // V6.3: 政策预警 badge 数量
  try {
    const pc = ((ds.policy_alerts || {}).alerts || []).length;
    const pcEl = document.getElementById('policy-count');
    if (pcEl) pcEl.textContent = pc || '—';
  } catch (e) {}

  document.getElementById('foot').innerHTML =
    'V5.0 数据来源：' + Object.keys(ds.data_sources || {}).length + ' 个数据源台账。' +
    '所有数据从 7 个 SSOT 数据库读取（tariff/shipping/policy/plant/material/fx_history/data_sources）。' +
    '版本: ' + ds.version + ' · 时间戳: ' + (ds.generated_at || '');

  document.body.addEventListener('click', e => {
    const matHdr = e.target.closest('.mat-hdr');
    if (matHdr) {
      const mat = matHdr.closest('.mat');
      const cur = mat.dataset.open === '1';
      mat.dataset.open = cur ? '0' : '1';
      matHdr.setAttribute('aria-expanded', !cur);
      return;
    }
    const plantHdr = e.target.closest('.plant-hdr');
    if (plantHdr) {
      const p = plantHdr.closest('.plant');
      const cur = p.dataset.open === '1';
      p.dataset.open = cur ? '0' : '1';
      plantHdr.setAttribute('aria-expanded', !cur);
      return;
    }
    const srcHdr = e.target.closest('.src-hdr');
    if (srcHdr) {
      const r = srcHdr.closest('.src-row');
      const cur = r.dataset.open === '1';
      r.dataset.open = cur ? '0' : '1';
      srcHdr.setAttribute('aria-expanded', !cur);
      return;
    }
    const layerHdr = e.target.closest('.layer-hdr');
    if (layerHdr) {
      const lr = layerHdr.closest('.layer-row');
      const cur = lr.dataset.open === '1';
      lr.dataset.open = cur ? '0' : '1';
      layerHdr.setAttribute('aria-expanded', !cur);
      return;
    }
    // V6.4: 供应商行点击展开（点击内部链接时不切换）
    const suppHdr = e.target.closest('.supp-row-hdr');
    if (suppHdr && !e.target.closest('a')) {
      const sr = suppHdr.closest('.supp-row');
      const cur = sr.dataset.open === '1';
      sr.dataset.open = cur ? '0' : '1';
      suppHdr.setAttribute('aria-expanded', !cur);
      return;
    }
    // V6.4: SKU 规格面板点击展开
    const skuHdr = e.target.closest('.sku-hdr');
    if (skuHdr) {
      const sp = skuHdr.closest('.sku-panel');
      sp.dataset.open = sp.dataset.open === '1' ? '0' : '1';
      return;
    }
  });
}

function formatDDP(c, fx) {
  if (c.ddp_usd_ton != null) {
    const cny = c.ddp_usd_ton * fx / 1000;
    return '最优 ¥' + cny.toFixed(3) + '/kg';
  }
  if (c.ddp_usd_pcs != null) {
    const cny = c.ddp_usd_pcs * fx;
    return '最优 ¥' + cny.toFixed(3) + '/个';
  }
  return '-';
}

// V6.4: 物料 SKU 关键规格面板（展示在物料卡片顶部）
function renderSkuSpec(matName, ds) {
  const m = (ds.materials || {})[matName] || {};
  const rows = m.sku_spec || [];
  if (!rows.length && !m.spec_text) return '';
  // premiums（升贴水/认证溢价）说明
  const sc = m.spec_constraints || {};
  const prem = sc.premiums || {};
  const premLabels = {
    hp_premium_usd_ton: 'Non-GMO/高蛋白升贴水',
    pkg_premium_usd_ton: '食品级包装溢价',
    foodgrade_premium_usd_ton: '食品级溢价'
  };
  const premItems = Object.entries(prem).filter(([, v]) => v).map(([k, v]) =>
    '<span class="sku-prem">' + (premLabels[k] || k) + ' +$' + v + '/吨</span>'
  ).join('');
  const rowHtml = rows.map(r =>
    '<tr><td class="sku-k">' + escapeHtml(r[0]) + '</td><td class="sku-v">' + escapeHtml(r[1]) + '</td></tr>'
  ).join('');
  return '<div class="sku-panel" data-open="0">' +
    '<div class="sku-hdr">' +
      '<span class="sku-arrow">›</span>' +
      '<span class="sku-title">SKU 关键规格</span>' +
      '<span class="sku-vol">年用量 ' + (m.annual_volume != null ? Number(m.annual_volume).toLocaleString() : '—') + ' ' + escapeHtml(m.unit || '') + ' · HS ' + escapeHtml(m.hs_code || '—') + '</span>' +
    '</div>' +
    '<div class="sku-body">' +
      (rowHtml ? '<table class="sku-table"><tbody>' + rowHtml + '</tbody></table>' : '<div style="font-size:12px;color:#666">' + escapeHtml(m.spec_text || '') + '</div>') +
      (premItems ? '<div class="sku-prem-bar"><b>价格影响（计入 EXW/DDP）：</b>' + premItems + '</div>' : '<div class="sku-prem-bar sku-noimpact">该物料规格不附加价格升贴水（EXW 即为食品级合规价）</div>') +
    '</div>' +
  '</div>';
}

// V6.3: AI 采购建议改为「动态生成」——基于映射表 trade_flow + DDP 排序 + 政策预警
// 根治「每次更新映射表都要手改文案」。INSIGHT_MAP 仅作可选的人工补充说明。
const INSIGHT_NOTE = {
  '非转基因黄大豆::EG_6OCT': '埃及无本地非转基因大豆产能，建议锁定 ProTerra+EFSA 双认证供应商签长约。',
  '非转基因黄大豆::CN_GD': '俄远东建议 CNY 结算规避制裁风险；非转大豆需 IP 全程身份保持。',
  '食用盐::CN_GD': '中国食盐专营，进口需食盐经营资质；国内产能充足可保供。',
  '变性淀粉::CN_GD': '蜡质玉米 E1442 高端品牌（Ingredion/Tate&Lyle）功能性仍优于国产，价差已缩窄至 +15-20%。',
  '296ml PET瓶::US_NC': '从中国进口关税达 38%，强烈建议本地或 USMCA 来源（墨西哥 0%）。',
};

function fmtCny(c, fx, isPcs) {
  if (isPcs && c.ddp_usd_pcs != null) return '¥' + (c.ddp_usd_pcs * fx).toFixed(3) + '/个';
  if (c.ddp_usd_ton != null) return '¥' + (c.ddp_usd_ton * fx / 1000).toFixed(3) + '/kg';
  return '—';
}

function buildDynamicInsight(material, plant_id, sortedCands, ds) {
  const fx = (ds.fx_rates || {}).USD_CNY || 6.84;
  const tfm = (ds.trade_flow_matrix || {})[material] || {};
  const plantFlow = tfm[plant_id] || {};
  const flowOrigins = plantFlow.origins || [];
  const isPcs = sortedCands.length && sortedCands[0].ddp_usd_pcs != null;
  // 政策预警：本 material×plant 相关且 decision_relevant 的条目
  const alerts = ((ds.policy_alerts || {}).alerts || []).filter(a =>
    a.material === material && (a.plant_scope || []).includes(plant_id) && a.decision_relevant
  );
  // DDP 最优（已在 candidates 层排除 blocked）
  const best = sortedCands[0];
  if (!best) return '暂无有效候选源（可能全部被政策禁令排除，请查看政策预警 tab）。';

  // 贸易流主力梯队（按 share 降序，排除 blocked/share=0）
  const tiers = flowOrigins
    .filter(o => (o.share || 0) > 0 && o.active !== false && !(o.tags || []).includes('政策禁令'))
    .sort((a, b) => (b.share || 0) - (a.share || 0));
  const localOne = tiers.find(o => o.type === 'local');
  const importTop = tiers.filter(o => o.type === 'import').slice(0, 3);

  let html = '';
  // 1) 推荐结论（DDP 最优）
  html += '<strong>' + (best.origin_name || best.origin_country) + '</strong> DDP 最优 ' +
    fmtCny(best, fx, isPcs) + '。';
  // 2) 真实贸易流主力梯队
  if (tiers.length) {
    const tierStr = tiers.slice(0, 4).map(o => {
      const flag = FLAG[o.country] || '';
      const pct = ((o.share || 0) * 100).toFixed(o.share < 0.1 ? 1 : 0);
      const tagStr = (o.tags || []).length ? '<span class="ins-tag">' + o.tags.join('·') + '</span>' : '';
      return flag + (o.country_zh || o.country) + ' ' + pct + '%' + tagStr;
    }).join('、');
    html += '<br><b>真实贸易流</b>：' + tierStr + '。';
  }
  // 3) 建议策略（本地优先 / 进口分散）
  html += '<br><b>建议策略</b>：';
  if (localOne && (localOne.share || 0) >= 0.5) {
    html += '本地 ' + (localOne.country_zh || localOne.country) + ' 为主（保供+抗物流中断）';
    if (importTop.length) html += '，' + importTop.slice(0, 2).map(o =>
      (o.country_zh || o.country)).join('/') + ' 进口为备选对冲单一来源风险';
    html += '。';
  } else if (importTop.length) {
    html += '以 ' + importTop[0].country_zh + ' 为主力（' + ((importTop[0].share || 0) * 100).toFixed(0) + '%）';
    if (importTop.length > 1) html += '，' + importTop.slice(1).map(o => o.country_zh).join('/') + ' 多源分散。';
    else html += '。';
  } else {
    html += '结合 DDP 排名 + 供应商资质综合决策。';
  }
  // 4) 政策预警（红字醒目）
  if (alerts.length) {
    html += '<div class="ins-alert">⚠ <b>政策预警</b>：' +
      alerts.map(a => a.title + '（' + a.summary.slice(0, 40) + '…）').join('；') + '</div>';

  // 5) 人工补充说明
  const note = INSIGHT_NOTE[material + '::' + plant_id];
  if (note) html += '<div class="ins-note">' + note + '</div>';
  return html;
}

function renderSrcRow(c, rank, ds, fx, material, plant_id) {

    const exwL = layers.find(L => /Layer 1\b/.test(L.label || '') || /EXW/.test(L.label || ''));

  const layerHtml = layers.length
    ? '<div class="layer-list">' + layers.map((L, idx) => {

        const num = (L.label || '').match(/Layer (\d)/);
        const numText = num ? num[1] : (idx + 1);
        // FOB 层（Layer 2）改为显示出口费 Δ：FOB - EXW
        const isFobLayer = /FOB/.test(L.label || '') || /Layer 2\b/.test(L.label || '');
        // 已是 delta 的层：海运/港费/关税（Layer 3-5），原值即增量
        const labelStr = L.label || '';
        const isAlreadyDelta = /Layer [3-5]\b/.test(labelStr) || /海运|港费|关税/.test(labelStr);
        let displayUsd = L.value_usd;

        if (isFobLayer && L.value_usd != null && exwLayerVal != null) {

        } else if (isAlreadyDelta && L.value_usd != null) {

        let valText;
        if (displayUsd == null) {
          valText = '<span style="color:#888;font-size:11px">参考层（无单值）</span>';
        } else {
          const lUnit = L.unit || '';
          const lIsPcs = lUnit.includes('个');
          // 吨 → 元/kg；个 → 元/个
          const cnyVal = lIsPcs ? (Number(displayUsd) * fx) : (Number(displayUsd) * fx / 1000);
          const lDecimals = 3;
          const lDispUnit = lIsPcs ? '元/个' : '元/kg';

    const contact = [
      s.phone ? '电话：' + escapeHtml(s.phone) : '',
      s.email ? '邮箱：' + escapeHtml(s.email) : '',
      s.website ? '官网：<a href="' + escapeHtml(s.website) + '" target="_blank" rel="noopener" class="supp-link">' + escapeHtml(s.website) + '↗</a>' : ''
    ].filter(Boolean).join(' · ') || '联系方式待补';
    const isNF = (s.status === 'not_found') || /\[NOT_FOUND\]/.test(s.name || '');
    return '<div class="supp-row' + (isNF ? ' nf' : '') + '">' +
      '<div class="supp-row-hdr" aria-expanded="false">' +
        '<span class="supp-arrow">›</span>' +
        '<span class="supp-tier ' + (s.tier || 'T2') + '">' + (s.tier || 'T2') + '</span>' +
        '<span class="supp-row-name">' + escapeHtml(s.name || '-') + '</span>' +
        '<span class="supp-row-score">规格 ' + (s.spec_score || 0) + ' · 评分 ' + (s.score || 0) + '</span>' +
        (s.status ? '<span class="supp-status ' + s.status + '">' + escapeHtml(s.status) + '</span>' : '') +
      '</div>' +
      '<div class="supp-row-body">' +
        (s.spec_match ? '<div class="supp-d"><b>规格匹配：</b>' + escapeHtml(s.spec_match) + '</div>' : '') +
        (certs ? '<div class="supp-d"><b>认证：</b>' + escapeHtml(certs) + '</div>' : '') +
        (s.annual_revenue ? '<div class="supp-d"><b>年营收：</b>' + escapeHtml(s.annual_revenue) + '</div>' : '') +
        (s.reason ? '<div class="supp-d"><b>说明：</b>' + escapeHtml(s.reason) + '</div>' : '') +

  return '<div class="src-row' + (c.is_best ? ' best' : '') + '" data-origin="' + escapeAttr(c.origin_country || '') + '">' +
    '<div class="src-hdr" aria-expanded="false">' +

    '<span class="src-flag">' + flag + '</span>' +
    '<span class="src-name">' + escapeHtml(c.origin_name || c.origin_country) +
    (c.is_best ? '<span class="src-best-tag">★最优</span>' : '<span class="src-rank">#' + (rank + 1) + '</span>') +
    '<span class="src-region">' + escapeHtml(region) + '</span>' +
    (c.is_local ? '<span class="src-region" style="background:#eaf3de;color:#3b6d11">本地</span>' : '') +

    '<span class="src-ddp">¥' + ddpCny.toFixed(ddpDecimals) + ' ' + ddpUnit + '</span>' +
    '</div>' +
    '<div class="src-body">' +
    summaryTable +
    '<div class="subsec">' + (c.is_local ? '本地链路 · 5 层成本拆解' : '跨境链路 · 7 层成本拆解') + '（点击每层查看数据来源）</div>' +

function renderPriceChart(matName, ds, plant_id) {
  const histRaw = ds.price_history && ds.price_history[matName];
  if (!histRaw || !Object.keys(histRaw).length) return '';

  // V6.2: 按 trade_flow_matrix 过滤要显示的国家
  // 1) 该 (matName, plant_id) MAP 内的 country 列表 → 仅显示这些
  // 2) MAP 未定义则保留全部（向后兼容）
  let allowedCountries = null;
  if (plant_id && ds.trade_flow_matrix
      && ds.trade_flow_matrix[matName]
      && ds.trade_flow_matrix[matName][plant_id]) {
    allowedCountries = new Set(
      (ds.trade_flow_matrix[matName][plant_id].origins || []).map(o => o.country)
    );
  }
  const hist = {};
  for (const c in histRaw) {
    if (!allowedCountries || allowedCountries.has(c)) hist[c] = histRaw[c];
  }
  if (!Object.keys(hist).length) return '';

  const W = 720, H = 200, PADL = 50, PADR = 20, PADT = 16, PADB = 36;
  const cw = W - PADL - PADR, ch = H - PADT - PADB;
  const allDates = new Set();
  let allVals = [];
  for (const c in hist) {
    for (const p of hist[c]) {
      allDates.add(p.date);
      if (p.price_usd) allVals.push(p.price_usd);
    }
  }
  if (!allVals.length) return '';
  const minV = Math.min(...allVals) * 0.92;
  const maxV = Math.max(...allVals) * 1.08;
  const dates = [...allDates].sort();
  const x = i => PADL + (cw * i / Math.max(1, dates.length - 1));
  const y = v => PADT + ch - (ch * (v - minV) / (maxV - minV));
  const colors = ['#c0392b','#185fa5','#3b6d11','#854f0b','#7c3aed','#0F6E56','#993556','#26215C','#1D9E75','#A32D2D','#522aaa'];
  let lines = '', legend = '', ci = 0;
  for (const country in hist) {
    const pts = hist[country];
    if (pts.length < 2) continue;
    const color = colors[ci % colors.length];
    let path = '';
    pts.forEach(p => {
      const di = dates.indexOf(p.date);
      if (di < 0) return;
      path += (path ? 'L' : 'M') + x(di).toFixed(1) + ' ' + y(p.price_usd).toFixed(1);
    });
    lines += '<path d="' + path + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
    legend += '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:11px"><span style="width:10px;height:2px;background:' + color + '"></span>' + (FLAG[country] || '') + ' ' + escapeHtml(country) + '</span>';
    ci++;
  }
  let yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const yv = minV + (maxV - minV) * (4 - i) / 4;
    const ypx = PADT + ch * i / 4;
    yLabels += '<text x="' + (PADL - 4) + '" y="' + (ypx + 3) + '" text-anchor="end" font-size="9" fill="#888">$' + yv.toFixed(yv < 10 ? 3 : 0) + '</text>';
    yLabels += '<line x1="' + PADL + '" y1="' + ypx + '" x2="' + (W - PADR) + '" y2="' + ypx + '" stroke="#f0f0f0"/>';
  }
  let xLabels = '';
  const step = Math.max(1, Math.ceil(dates.length / 6));
  dates.forEach((d, i) => {
    if (i % step === 0 || i === dates.length - 1) {
      xLabels += '<text x="' + x(i) + '" y="' + (H - PADB + 14) + '" text-anchor="middle" font-size="9" fill="#888">' + d.slice(2, 7) + '</text>';
    }
  });
  const scopeNote = allowedCountries
    ? '（' + dates.length + ' 期 · ' + Object.keys(hist).length + ' 国 · V6.2 MAP 过滤）'
    : '（' + dates.length + ' 期 · 多源验证）';
  return '<div class="chart-wrap">' +
    '<div class="chart-title">价格历史曲线 — ' + escapeHtml(matName) + scopeNote + '</div>' +
    '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<rect width="' + W + '" height="' + H + '" fill="#fff"/>' +
    yLabels + xLabels + lines +
    '</svg>' +
    '<div style="margin-top:8px">' + legend + '</div>' +
    '</div>';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

        '<div class="country">'+escapeHtml(r.origin_id||'')+' · '+escapeHtml(r.country||'?')+'</div></td>'+
      '<td class="num">'+exw+'</td>'+
      '<td class="num"><span class="ledger-source-count '+scCls+'">'+sc+'</span></td>'+
      '<td><span class="ledger-status '+ss+'">'+ss+'</span>'+
        (r.status==='archived'?' <span class="ledger-status archived" style="margin-left:4px">archived</span>':'')+'</td>'+
      '<td style="font-size:10.5px;color:#888">'+escapeHtml(r.last_updated||'—')+'</td>'+
      '<td>'+foodTag+'</td>'+
      '<td class="ledger-evidence">'+urlList+'</td>'+
      '</tr>';
  }

  const tbody = document.querySelector('#ledger-table tbody');
  tbody.innerHTML = flat.map(rowHtml).join('');

  // 过滤交互
  function applyFilter(){
    const m = document.getElementById('ledger-mat').value;
    const s = document.getElementById('ledger-status').value;
    const q = document.getElementById('ledger-search').value.trim().toLowerCase();
    let shown = 0;
    tbody.querySelectorAll('tr').forEach(tr => {
      const okM = !m || tr.dataset.mat === m;
      const okS = !s || tr.dataset.status === s;
      const okQ = !q || (tr.dataset.search || '').includes(q);
      const ok = okM && okS && okQ;
      tr.style.display = ok ? '' : 'none';
      if (ok) shown++;
    });
    document.getElementById('ledger-count').textContent = shown;
  }
  document.getElementById('ledger-mat').addEventListener('change', applyFilter);
  document.getElementById('ledger-status').addEventListener('change', applyFilter);
  document.getElementById('ledger-search').addEventListener('input', applyFilter);
}

function setupV62Tabs(ds){
  const tabs = document.querySelectorAll('.v62-tab');
  const decision = document.getElementById('tab-decision');
  const ledger = document.getElementById('tab-ledger');
  const policy = document.getElementById('tab-policy');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const which = btn.dataset.tab;
      decision.style.display = which === 'decision' ? '' : 'none';
      ledger.style.display = which === 'ledger' ? '' : 'none';
      policy.style.display = which === 'policy' ? '' : 'none';
      if (which === 'ledger' && !ledger.dataset.rendered) {
        renderLedger(ds);
        ledger.dataset.rendered = '1';
      }
      if (which === 'policy' && !policy.dataset.rendered) {
        renderPolicyAlerts(ds);
        policy.dataset.rendered = '1';
      }
      syncSideNavTab(which);
    });
  });
}

// ── V6.9: 左侧浮动导航栏 ──
function selectMainTab(which){
  const btn = document.querySelector('.v62-tab[data-tab="' + which + '"]');
  if (btn) btn.click();
}
function syncSideNavTab(which){
  document.querySelectorAll('#sn-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === which));
  const body = document.getElementById('sn-body');
  if (!body) return;
  body.style.display = which === 'decision' ? '' : 'none';
}
function setupSideNav(ds){
  const body = document.getElementById('sn-body');
  if (!body) return;
  const mats = ds.materials || {};
  const cands = ds.candidates || [];
  const fx = (ds.fx_rates && ds.fx_rates.USD_CNY) || 7.2;
  const plantsMeta = ds.plants || {};

  let html = '';
  Object.keys(mats).forEach(matName => {
    const matCands = cands.filter(c => c.material === matName);
    // 按工厂分组
    const byPlant = {};
    matCands.forEach(c => {
      const pid = c.plant_id || '—';
      (byPlant[pid] = byPlant[pid] || []).push(c);
    });
    let sub = '';
    Object.keys(byPlant).forEach(pid => {
      const pm = plantsMeta[pid] || {};
      const pLabel = (pm.short_name || pid) + (pm.country ? '（' + pm.country + '）' : '');
      sub += '<div class="sn-plant">' + escapeHtml(pLabel) + '</div>';
      // 货源国按 DDP 升序
      const rows = byPlant[pid].slice().sort((a,b) => {
        const va = a.ddp_usd_pcs != null ? a.ddp_usd_pcs*1000 : (a.ddp_usd_ton||0);
        const vb = b.ddp_usd_pcs != null ? b.ddp_usd_pcs*1000 : (b.ddp_usd_ton||0);
        return va - vb;
      });
      rows.forEach(c => {
        const oc = c.origin_country || '';
        const isPcs = c.ddp_usd_pcs != null;
        const ddpUsd = isPcs ? c.ddp_usd_pcs : c.ddp_usd_ton;
        const ddpCny = isPcs ? (ddpUsd*fx) : (ddpUsd*fx/1000);
        const unit = isPcs ? '/个' : '/kg';
        const flag = FLAG[oc] || '';
        sub += '<div class="sn-origin" data-mat="' + escapeAttr(matName) +
          '" data-plant="' + escapeAttr(pid) + '" data-origin="' + escapeAttr(oc) + '">' +
          '<span class="dot"' + (c.is_best ? ' style="background:#c0392b"' : '') + '></span>' +
          '<span>' + flag + ' ' + escapeHtml(c.origin_name || oc) + '</span>' +
          '<span class="ddp">¥' + ddpCny.toFixed(3) + unit + '</span>' +
          '</div>';
      });
    });
    html += '<div class="sn-mat" data-mat="' + escapeAttr(matName) + '">' +
      '<div class="sn-mat-hdr" data-mat="' + escapeAttr(matName) + '">' +
      '<span class="caret">›</span><span>' + escapeHtml(matName) + '</span>' +
      '</div>' +
      '<div class="sn-sub">' + sub + '</div></div>';
  });
  body.innerHTML = html;

  // 品类标题：点击 = 在导航里展开/收起子树 + 定位到该品类卡片
  body.querySelectorAll('.sn-mat-hdr').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const mat = hdr.dataset.mat;
      const subEl = hdr.nextElementSibling;
      const isOpen = hdr.classList.contains('open');
      hdr.classList.toggle('open', !isOpen);
      subEl.classList.toggle('open', !isOpen);
      gotoTarget(mat, null, null);
    });
  });
  // 货源国：点击 = 切 tab + 逐层展开 + 滚动 + 高亮
  body.querySelectorAll('.sn-origin').forEach(row => {
    row.addEventListener('click', () => {
      gotoTarget(row.dataset.mat, row.dataset.plant, row.dataset.origin);
    });
  });

  // 顶部 tab
  document.querySelectorAll('#sn-tabs button').forEach(b => {
    b.addEventListener('click', () => selectMainTab(b.dataset.tab));
  });
  // 全部收起
  const collapseBtn = document.getElementById('sn-collapse-all');
  if (collapseBtn) collapseBtn.addEventListener('click', collapseAllCards);
  // 回顶部
  const topBtn = document.getElementById('sn-top');
  if (topBtn) topBtn.addEventListener('click', () =>
    window.scrollTo({ top: 0, behavior: 'smooth' }));
  // 收起/展开导航本体
  const hideBtn = document.getElementById('sn-hide');
  const showBtn = document.getElementById('sn-show');
  const navEl = document.getElementById('sidenav');
  if (hideBtn) hideBtn.addEventListener('click', () => navEl.classList.add('collapsed'));
  if (showBtn) showBtn.addEventListener('click', () => navEl.classList.remove('collapsed'));

  setupScrollSpy();
}

function expandCard(hdr){
  if (!hdr) return;
  const card = hdr.parentElement;
  if (card.dataset.open !== '1') {
    card.dataset.open = '1';
    hdr.setAttribute('aria-expanded', 'true');
  }
}
function gotoTarget(mat, plant, origin){
  selectMainTab('decision');
  const matEl = document.querySelector('.mat[data-mat-id="' + cssEsc(mat) + '"]');
  if (!matEl) return;
  expandCard(matEl.querySelector('.mat-hdr'));
  let target = matEl;
  if (plant) {
    const plantEl = matEl.querySelector('.plant .plant-hdr[data-plant-id="' + cssEsc(plant) + '"]');
    if (plantEl) {
      expandCard(plantEl);
      target = plantEl.parentElement;
      if (origin) {
        // 等待 DOM 展开后再找货源国行
        requestAnimationFrame(() => {
          const srcEl = plantEl.parentElement.querySelector('.src-row[data-origin="' + cssEsc(origin) + '"]');
          const tgt = srcEl || plantEl;
          scrollAndFlash(tgt);
        });
        return;
      }
    }
  }
  requestAnimationFrame(() => scrollAndFlash(target));
}
function scrollAndFlash(el){
  if (!el) return;
  const y = el.getBoundingClientRect().top + window.pageYOffset - 16;
  window.scrollTo({ top: y, behavior: 'smooth' });
  const flashEl = el.querySelector('.src-hdr, .plant-hdr, .mat-hdr') || el;
  flashEl.classList.remove('hl-flash');
  void flashEl.offsetWidth;
  flashEl.classList.add('hl-flash');
}
function collapseAllCards(){
  document.querySelectorAll('#tab-decision .mat[data-open],#tab-decision .plant[data-open],#tab-decision .src-row[data-open],#tab-decision .layer-row[data-open],#tab-decision .supp-row[data-open]').forEach(el => {
    el.dataset.open = '0';
    const hdr = el.querySelector('[aria-expanded]');
    if (hdr) hdr.setAttribute('aria-expanded', 'false');
  });
  document.querySelectorAll('.sn-mat-hdr.open').forEach(h => {
    h.classList.remove('open');
    if (h.nextElementSibling) h.nextElementSibling.classList.remove('open');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function cssEsc(s){
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return String(s).replace(/["\\\]]/g, '\\$&');
}
function setupScrollSpy(){
  const matEls = Array.from(document.querySelectorAll('.mat[data-mat-id]'));
  if (!matEls.length) return;
  let ticking = false;
  function update(){
    ticking = false;
    let activeMat = null;
    const probe = window.innerHeight * 0.3;
    matEls.forEach(el => {
      const r = el.getBoundingClientRect();
      if (r.top <= probe) activeMat = el.dataset.matId;
    });
    document.querySelectorAll('.sn-mat-hdr').forEach(h =>
      h.classList.toggle('active', h.dataset.mat === activeMat));
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
  update();
}

const POLICY_LV_LABEL = { critical: '高风险', warn: '关注', info: '提示' };
const FLAG_ZH = {
  '中国':'🇨🇳','俄罗斯':'🇷🇺','贝宁':'🇧🇯','美国':'🇺🇸','印尼':'🇮🇩','埃及':'🇪🇬',
  '乌克兰':'🇺🇦','巴西':'🇧🇷','全球':'🌐','印度':'🇮🇳','澳大利亚':'🇦🇺','法国':'🇫🇷','英国':'🇬🇧'
};

function renderPolicyAlerts(ds){
  const pa = (ds && ds.policy_alerts) || {};
  const alerts = pa.alerts || [];
  const meta = pa.meta || {};
  const host = document.getElementById('tab-policy');
  if (!alerts.length) {
    host.innerHTML = '<div class="loading" style="color:#888">暂无政策预警台账数据</div>';
    return;
  }
  const cats = Array.from(new Set(alerts.map(a => a.category_zh || a.category)));
  const summary = `
    <div class="policy-summary">
      <div class="policy-stat"><div class="n">${meta.total || alerts.length}</div><div class="l">政策台账总数</div></div>
      <div class="policy-stat crit"><div class="n">${meta.critical_count || 0}</div><div class="l">高风险预警</div></div>
      <div class="policy-stat dec"><div class="n">${meta.decision_relevant_count || 0}</div><div class="l">影响采购决策</div></div>
      <div class="policy-stat"><div class="n" style="font-size:13px;font-weight:500;color:#888;padding-top:3px">${meta.last_updated || '—'}</div><div class="l">数据更新日期</div></div>
    </div>`;
  const filterBar = `
    <div class="policy-filter">
      <button class="policy-fbtn active" data-f="all">全部 (${alerts.length})</button>
      <button class="policy-fbtn" data-f="lv-critical">高风险</button>
      <button class="policy-fbtn" data-f="dec">影响决策</button>
      ${cats.map(c => `<button class="policy-fbtn" data-cat="${c}">${c}</button>`).join('')}
    </div>`;
  const cards = alerts.map(a => {
    const lv = a.level || 'info';
    const flag = FLAG_ZH[a.country_zh] || '';
    const plants = (a.plant_scope || []).join(' / ');
    const tags = (a.tags || []);
    const urls = (a.evidence_urls || []);
    const srcText = (a.evidence || []).slice(0,2).join('；');
    return `
      <div class="policy-card lv-${lv}" data-lv="lv-${lv}" data-cat="${a.category_zh || a.category}" data-dec="${a.decision_relevant ? '1':'0'}">
        <div class="policy-card-head">
          <span class="policy-badge lv-${lv}">${POLICY_LV_LABEL[lv] || lv}</span>
          <span class="policy-cat">${a.category_zh || a.category}</span>
          ${a.decision_relevant ? '<span class="policy-dec">影响决策</span>' : ''}
          <span class="policy-title">${a.title || ''}</span>
          <span class="policy-meta">${flag} ${a.country_zh || ''} · ${a.material || ''}${plants ? ' · '+plants : ''}</span>
        </div>
        <div class="policy-sum">${a.summary || ''}</div>
        ${a.impact ? `<div class="policy-impact"><b>影响 ›</b> ${a.impact}</div>` : ''}
        ${tags.length ? `<div class="policy-tags">${tags.map(t => `<span class="policy-tag"># ${t}</span>`).join('')}</div>` : ''}
        <div class="policy-src">来源：${srcText}${urls.length ? ' · '+urls.slice(0,1).map(u => `<a href="${u}" target="_blank">链接</a>`).join('') : ''} · 生效 ${a.effective_date || '—'}</div>
      </div>`;
  }).join('');
  host.innerHTML = summary + filterBar + '<div class="policy-wrap" id="policy-list">' + cards + '</div>';

  const fbtns = host.querySelectorAll('.policy-fbtn');
  const allCards = host.querySelectorAll('.policy-card');
  fbtns.forEach(b => b.addEventListener('click', () => {
    fbtns.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const f = b.dataset.f, cat = b.dataset.cat;
    allCards.forEach(c => {
      let show = true;
      if (f === 'lv-critical') show = c.dataset.lv === 'lv-critical';
      else if (f === 'dec') show = c.dataset.dec === '1';
      else if (cat) show = c.dataset.cat === cat;
      c.style.display = show ? '' : 'none';
    });
  }));
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
